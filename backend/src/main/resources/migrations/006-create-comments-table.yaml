databaseChangeLog:
  - changeSet:
      id: 006-create-comments-table
      author: bereketab
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: post_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_comments_post
                    references: posts(id)
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_comments_user
                    references: users(id)
              - column:
                  name: content
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - createIndex:
            tableName: comments
            indexName: idx_comments_post_id
            columns:
              - column:
                  name: post_id