              ('60000000-0000-0000-0000-000000000004','40000000-0000-0000-0000-000000000002','10000000-0000-0000-0000-000000000008','68 miles in a week! I did 30 and thought I was crushing it. You''re a beast 🔥',NOW()-INTERVAL '44 days'),
              ('60000000-0000-0000-0000-000000000005','40000000-0000-0000-0000-000000000002','10000000-0000-0000-0000-000000000010','The 22-mile long run at race pace is the real test. Boston is lucky to have you!',NOW()-INTERVAL '44 days'),
              ('60000000-0000-0000-0000-000000000006','40000000-0000-0000-0000-000000000004','10000000-0000-0000-0000-000000000001','Starting my 7-day experiment tomorrow. I''ve been avoiding meditation for years 🤞',NOW()-INTERVAL '57 days'),
              ('60000000-0000-0000-0000-000000000007','40000000-0000-0000-0000-000000000004','10000000-0000-0000-0000-000000000005','The mental clarity is real. Day 3 is usually when the resistance breaks down 💙',NOW()-INTERVAL '57 days'),
              ('60000000-0000-0000-0000-000000000008','40000000-0000-0000-0000-000000000004','10000000-0000-0000-0000-000000000015','Sharing this with my entire community. Everyone needs to read this.',NOW()-INTERVAL '56 days'),
              ('60000000-0000-0000-0000-000000000009','40000000-0000-0000-0000-000000000007','10000000-0000-0000-0000-000000000001','182kg!! That is absolutely insane progress. What does your programming look like?',NOW()-INTERVAL '54 days'),
              ('60000000-0000-0000-0000-000000000010','40000000-0000-0000-0000-000000000007','10000000-0000-0000-0000-000000000006','This is proof that consistency beats talent every single time. Congrats!',NOW()-INTERVAL '54 days'),
              ('60000000-0000-0000-0000-000000000011','40000000-0000-0000-0000-000000000007','10000000-0000-0000-0000-000000000010','The bar never lies. Progressive overload is the only way. Respect! 🔥',NOW()-INTERVAL '53 days'),
              ('60000000-0000-0000-0000-000000000012','40000000-0000-0000-0000-000000000010','10000000-0000-0000-0000-000000000007','The sea salt tip is a game changer! I''ve been doing this for 3 months now.',NOW()-INTERVAL '51 days'),
              ('60000000-0000-0000-0000-000000000013','40000000-0000-0000-0000-000000000010','10000000-0000-0000-0000-000000000012','Do you have a specific brand of sea salt you recommend for this?',NOW()-INTERVAL '51 days'),
              ('60000000-0000-0000-0000-000000000014','40000000-0000-0000-0000-000000000013','10000000-0000-0000-0000-000000000014','Night 45! I tried this for 2 weeks and the difference in how I felt was shocking.',NOW()-INTERVAL '47 days'),
              ('60000000-0000-0000-0000-000000000015','40000000-0000-0000-0000-000000000013','10000000-0000-0000-0000-000000000002','Sleep quality is so underrated. I tell every yoga student: rest is practice too.',NOW()-INTERVAL '47 days'),
              ('60000000-0000-0000-0000-000000000016','40000000-0000-0000-0000-000000000015','10000000-0000-0000-0000-000000000001','Sunrise rides are the best way to start a weekend. Nothing compares to it!',NOW()-INTERVAL '41 days'),
              ('60000000-0000-0000-0000-000000000017','40000000-0000-0000-0000-000000000015','10000000-0000-0000-0000-000000000008','Cycling community really does have its own special energy. Keep it up!',NOW()-INTERVAL '41 days'),
              ('60000000-0000-0000-0000-000000000018','40000000-0000-0000-0000-000000000017','10000000-0000-0000-0000-000000000004','45 days no sugar! I''m on day 12 and already feeling so different. You inspire me!',NOW()-INTERVAL '37 days'),
              ('60000000-0000-0000-0000-000000000019','40000000-0000-0000-0000-000000000017','10000000-0000-0000-0000-000000000009','The afternoon energy stability is what I notice most too. No more 3pm slumps!',NOW()-INTERVAL '37 days'),
              ('60000000-0000-0000-0000-000000000020','40000000-0000-0000-0000-000000000020','10000000-0000-0000-0000-000000000006','1200m elevation gain is no joke. What shoes are you running in these days?',NOW()-INTERVAL '34 days'),
              ('60000000-0000-0000-0000-000000000021','40000000-0000-0000-0000-000000000020','10000000-0000-0000-0000-000000000003','The post-run coffee hits different after something like that 😂 Absolute beast!',NOW()-INTERVAL '34 days'),
              ('60000000-0000-0000-0000-000000000022','40000000-0000-0000-0000-000000000022','10000000-0000-0000-0000-000000000002','Day 300 is incredible. The consistency you''ve shown is truly something special 🙏',NOW()-INTERVAL '29 days'),
              ('60000000-0000-0000-0000-000000000023','40000000-0000-0000-0000-000000000022','10000000-0000-0000-0000-000000000011','I read about neuroplasticity from meditation and this proves it. You''re living it!',NOW()-INTERVAL '29 days'),
              ('60000000-0000-0000-0000-000000000024','40000000-0000-0000-0000-000000000024','10000000-0000-0000-0000-000000000001','This is exactly the programming I needed. Adding this to my next track session!',NOW()-INTERVAL '27 days'),
              ('60000000-0000-0000-0000-000000000025','40000000-0000-0000-0000-000000000024','10000000-0000-0000-0000-000000000006','Rest IS training. This needs to be plastered on every gym wall. Preach!',NOW()-INTERVAL '27 days'),
              ('60000000-0000-0000-0000-000000000026','40000000-0000-0000-0000-000000000026','10000000-0000-0000-0000-000000000001','Atomic Habits changed the way I approach my running training too. Great pick!',NOW()-INTERVAL '24 days'),
              ('60000000-0000-0000-0000-000000000027','40000000-0000-0000-0000-000000000026','10000000-0000-0000-0000-000000000009','The 1% better every day concept is literally the foundation of my coaching approach.',NOW()-INTERVAL '24 days'),
              ('60000000-0000-0000-0000-000000000028','40000000-0000-0000-0000-000000000028','10000000-0000-0000-0000-000000000005','14°C open water! I shiver in a heated pool 😂 Absolute respect for this.',NOW()-INTERVAL '21 days'),
              ('60000000-0000-0000-0000-000000000029','40000000-0000-0000-0000-000000000028','10000000-0000-0000-0000-000000000003','Cold exposure is massive for inflammation and recovery. Wim Hof approves! 🧊',NOW()-INTERVAL '21 days'),
              ('60000000-0000-0000-0000-000000000030','40000000-0000-0000-0000-000000000030','10000000-0000-0000-0000-000000000004','Made these last night! Added dark chocolate chips. Absolute perfection. Thank you!',NOW()-INTERVAL '17 days'),
              ('60000000-0000-0000-0000-000000000031','40000000-0000-0000-0000-000000000030','10000000-0000-0000-0000-000000000007','These are my go-to pre-workout snack! Great reminder to make a new batch 🙌',NOW()-INTERVAL '17 days'),
              ('60000000-0000-0000-0000-000000000032','40000000-0000-0000-0000-000000000031','10000000-0000-0000-0000-000000000002','Golden milk before bed has completely replaced my chamomile tea routine. Life-changing!',NOW()-INTERVAL '7 days'),
              ('60000000-0000-0000-0000-000000000033','40000000-0000-0000-0000-000000000032','10000000-0000-0000-0000-000000000008','FULL SPLITS! 8 months of dedication. This is incredible. You inspire me to stretch more!',NOW()-INTERVAL '14 days'),
              ('60000000-0000-0000-0000-000000000034','40000000-0000-0000-0000-000000000032','10000000-0000-0000-0000-000000000012','I''ve been doing daily stretching for 3 months. Still a long way from splits but progress is real!',NOW()-INTERVAL '14 days'),
              ('60000000-0000-0000-0000-000000000035','40000000-0000-0000-0000-000000000034','10000000-0000-0000-0000-000000000009','47 people! Community wellness is so powerful. You''re building something amazing here 🤝',NOW()-INTERVAL '11 days'),
              ('60000000-0000-0000-0000-000000000036','40000000-0000-0000-0000-000000000034','10000000-0000-0000-0000-000000000002','This is what social fitness should look like. Not competition — community. Love this!',NOW()-INTERVAL '11 days'),
              ('60000000-0000-0000-0000-000000000037','40000000-0000-0000-0000-000000000035','10000000-0000-0000-0000-000000000001','Just joined! Accountability partners are the single biggest factor in consistency.',NOW()-INTERVAL '5 days'),
              ('60000000-0000-0000-0000-000000000038','40000000-0000-0000-0000-000000000035','10000000-0000-0000-0000-000000000011','The online wellness space needs more authentic communities like this. Signed up!',NOW()-INTERVAL '5 days'),
              ('60000000-0000-0000-0000-000000000039','40000000-0000-0000-0000-000000000036','10000000-0000-0000-0000-000000000007','156 members with improved sleep? The data speaks for itself. This is real impact!',NOW()-INTERVAL '20 hours'),
              ('60000000-0000-0000-0000-000000000040','40000000-0000-0000-0000-000000000036','10000000-0000-0000-0000-000000000013','203 habit streaks completed! That is a staggering number. You should be so proud 🌟',NOW()-INTERVAL '18 hours'),
              ('60000000-0000-0000-0000-000000000041','40000000-0000-0000-0000-000000000005','10000000-0000-0000-0000-000000000003','Drop a 🧘 if you practiced today — logging in to say I did my full 75 min flow!',NOW()-INTERVAL '39 days'),
              ('60000000-0000-0000-0000-000000000042','40000000-0000-0000-0000-000000000008','10000000-0000-0000-0000-000000000014','Doing legs today! Nordic curls are absolutely brutal but the hamstring gains are worth it.',NOW()-INTERVAL '34 days'),
              ('60000000-0000-0000-0000-000000000043','40000000-0000-0000-0000-000000000011','10000000-0000-0000-0000-000000000001','I just hit 8 consecutive days of 3L! The skin improvement is real. Thank you for this!',NOW()-INTERVAL '37 days'),
              ('60000000-0000-0000-0000-000000000044','40000000-0000-0000-0000-000000000014','10000000-0000-0000-0000-000000000005','The cool room temperature tip alone added almost 40 minutes to my sleep duration. Simple but powerful!',NOW()-INTERVAL '27 days'),
              ('60000000-0000-0000-0000-000000000045','40000000-0000-0000-0000-000000000018','10000000-0000-0000-0000-000000000004','Made this for breakfast and my whole family loved it! Under 15 min and looks like a restaurant dish.',NOW()-INTERVAL '21 days'),
              ('60000000-0000-0000-0000-000000000046','40000000-0000-0000-0000-000000000019','10000000-0000-0000-0000-000000000001','I printed this out and put it on my fridge. Eating the rainbow is my new family goal.',NOW()-INTERVAL '9 days'),
              ('60000000-0000-0000-0000-000000000047','40000000-0000-0000-0000-000000000021','10000000-0000-0000-0000-000000000006','I use hiking poles on every technical descent now. Knees feel so much better at the end.',NOW()-INTERVAL '17 days'),
              ('60000000-0000-0000-0000-000000000048','40000000-0000-0000-0000-000000000029','10000000-0000-0000-0000-000000000001','Bilateral breathing changed my swim completely. Took 3 weeks but now it feels natural!',NOW()-INTERVAL '7 days');
