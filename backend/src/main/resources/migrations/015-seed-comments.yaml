              INSERT INTO public.comments (id, post_id, user_id, content, created_at) VALUES
              ('60000000-0000-0000-0000-000000000001','40000000-0000-0000-0000-000000000001','10000000-0000-0000-0000-000000000002','42 minutes is incredible! My best 10K is 51 and I thought that was good 😅',NOW()-INTERVAL '59 days'),
              ('60000000-0000-0000-0000-000000000002','40000000-0000-0000-0000-000000000001','10000000-0000-0000-0000-000000000006','Lacing up really is the hardest part. Once you''re out the door, momentum carries you!',NOW()-INTERVAL '59 days'),
