databaseChangeLog:
  - changeSet:
      id: 007-create-likes-table
      author: bereketab
      changes:
        - createTable:
            tableName: likes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: post_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_likes_post
                    references: posts(id)
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_likes_user
                    references: users(id)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: likes
            constraintName: uq_likes_post_user
            columnNames: post_id, user_id

        - createIndex:
            tableName: likes
            indexName: idx_likes_post_id
            columns:
              - column:
                  name: post_id