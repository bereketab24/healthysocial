databaseChangeLog:
  - changeSet:
      id: 005-create-posts-table
      author: bereketab
      changes:
        - createTable:
            tableName: posts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_posts_user
                    references: users(id)
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: image_url
                  type: VARCHAR(2048)
              - column:
                  name: post_type
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - createIndex:
            tableName: posts
            indexName: idx_posts_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: posts
            indexName: idx_posts_created_at
            columns:
              - column:
                  name: created_at