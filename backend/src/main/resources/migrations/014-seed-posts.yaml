databaseChangeLog:
  - changeSet:
      id: 014-seed-posts
      author: bereketab
      changes:
        - sql:
            sql: |
              INSERT INTO public.posts (id, user_id, content, post_type, created_at, updated_at) VALUES
              ('40000000-0000-0000-0000-000000000001','10000000-0000-0000-0000-000000000001','Just finished my morning 10K in 42 minutes! Every single day is a new opportunity to push your limits. The hardest part is always lacing up — after that, your body takes over 🏃‍♂️💪','MOTIVATION',NOW()-INTERVAL '60 days',NOW()-INTERVAL '60 days'),
              ('40000000-0000-0000-0000-000000000002','10000000-0000-0000-0000-000000000001','Week 12 of marathon training complete! 68 miles this week, including a 22-mile long run at race pace. My legs hate me but my heart loves it. Boston, I''m coming for you 🎽','PROGRESS',NOW()-INTERVAL '45 days',NOW()-INTERVAL '45 days'),
              ('40000000-0000-0000-0000-000000000003','10000000-0000-0000-0000-000000000001','5 tips to stay motivated during long runs: 1) Break it into mile-by-mile chunks. 2) Save your best playlist for the tough miles. 3) Run with a friend once a week. 4) Focus on effort, not pace. 5) Celebrate every finish, fast or slow! 🎯','TIP',NOW()-INTERVAL '30 days',NOW()-INTERVAL '30 days'),
              ('40000000-0000-0000-0000-000000000004','10000000-0000-0000-0000-000000000002','Starting every morning with 20 minutes of silent meditation has completely transformed my mental clarity and emotional regulation. 7 days is all it takes to feel the difference. Your mind is a muscle — train it 🧘‍♀️','MOTIVATION',NOW()-INTERVAL '58 days',NOW()-INTERVAL '58 days'),
              ('40000000-0000-0000-0000-000000000005','10000000-0000-0000-0000-000000000002','Today''s yoga flow: Sun Salutations ×12, Warrior sequence, Crow pose, Savasana. 75 minutes total. Your body will thank you. Your mind will too. Drop a 🧘 if you practiced today!','WORKOUT',NOW()-INTERVAL '40 days',NOW()-INTERVAL '40 days'),
              ('40000000-0000-0000-0000-000000000006','10000000-0000-0000-0000-000000000002','Matcha Smoothie Bowl: blend 2 frozen bananas + 1 tsp ceremonial matcha + splash of oat milk. Top with granola, sliced mango, hemp seeds, and a drizzle of honey. Takes 5 minutes. Tastes like a spa 🍵🌸','RECIPE',NOW()-INTERVAL '20 days',NOW()-INTERVAL '20 days'),
              ('40000000-0000-0000-0000-000000000007','10000000-0000-0000-0000-000000000003','NEW PR!!! Just pulled 182kg on the deadlift — 6 months ago I couldn''t touch 130kg. This is what consistent progressive overload looks like. Trust the process. The barbell doesn''t lie 🔥🏋️','ACHIEVEMENT',NOW()-INTERVAL '55 days',NOW()-INTERVAL '55 days'),
              ('40000000-0000-0000-0000-000000000008','10000000-0000-0000-0000-000000000003','Workout of the Day: 5×5 Back Squat @85%, 4×6 Romanian Deadlift, 3×10 Leg Press, 3×12 Nordic Curls, 3×15 Calf Raises. Rest 2-3 min between heavy sets. Drop a 🦵 if you''re doing legs today!','WORKOUT',NOW()-INTERVAL '35 days',NOW()-INTERVAL '35 days'),
              ('40000000-0000-0000-0000-000000000009','10000000-0000-0000-0000-000000000003','The biggest mistake people make with strength training: skipping the boring stuff. Mobility work, sleep, nutrition — these are the 80% that determine your 20% in the gym. You can''t out-train a bad recovery protocol 💡','TIP',NOW()-INTERVAL '15 days',NOW()-INTERVAL '15 days'),
              ('40000000-0000-0000-0000-000000000010','10000000-0000-0000-0000-000000000004','Hydration hack that elite athletes swear by: add a pinch of sea salt + a squeeze of lemon to your water bottle. Your cells absorb it 3× faster. Electrolyte balance is not just for marathoners — it''s for everyone 💧','TIP',NOW()-INTERVAL '52 days',NOW()-INTERVAL '52 days'),
              ('40000000-0000-0000-0000-000000000011','10000000-0000-0000-0000-000000000004','Week 8 of my 90-Day Hydration Challenge! My skin is visibly clearer, my energy stays consistent all afternoon, and I''ve dropped 2kg of water retention weight. Who else is in? Comment your water intake today! 💧','CHALLENGE_UPDATE',NOW()-INTERVAL '38 days',NOW()-INTERVAL '38 days'),
              ('40000000-0000-0000-0000-000000000012','10000000-0000-0000-0000-000000000004','Meal prep Sunday done ✅ — 5 balanced meals ready for the week: grilled salmon + quinoa, chicken Buddha bowls, lentil soup, overnight oats, and a big veggie frittata. Preparation is the key to nutritional success 🥗','PROGRESS',NOW()-INTERVAL '18 days',NOW()-INTERVAL '18 days'),
              ('40000000-0000-0000-0000-000000000013','10000000-0000-0000-0000-000000000005','Night 45 of my 90-day sleep project. Average sleep duration has gone from 6.2h to 7.8h. The mood improvement is undeniable. The correlation between sleep quality and cognitive performance is real — this is not optional health 😴📊','PROGRESS',NOW()-INTERVAL '48 days',NOW()-INTERVAL '48 days'),
              ('40000000-0000-0000-0000-000000000014','10000000-0000-0000-0000-000000000005','3 sleep hacks that actually work (backed by research): 1) Keep your room at 65-68°F/18-20°C. 2) Complete darkness — blackout curtains. 3) No screens 60 mins before bed — your melatonin will thank you. Sleep is performance 🌙','TIP',NOW()-INTERVAL '28 days',NOW()-INTERVAL '28 days'),
              ('40000000-0000-0000-0000-000000000015','10000000-0000-0000-0000-000000000006','Saturday 50km ride complete! Sunrise over the hills was absolutely spectacular. Cycling community is unmatched — strangers waving, cafes with bike racks, the silence of early morning roads 🚴‍♂️🌅','ACHIEVEMENT',NOW()-INTERVAL '42 days',NOW()-INTERVAL '42 days'),
              ('40000000-0000-0000-0000-000000000016','10000000-0000-0000-0000-000000000006','550km down in the annual cycling challenge with 450km to go before December! Current pace: on track. Legs feeling strong. If you want to join the 1000km challenge, comment below — accountability partners welcome! 🚴','CHALLENGE_UPDATE',NOW()-INTERVAL '25 days',NOW()-INTERVAL '25 days'),
              ('40000000-0000-0000-0000-000000000017','10000000-0000-0000-0000-000000000007','Day 45 of eliminating all processed sugar. Energy levels are completely stable throughout the day — zero afternoon crashes. Clearer thinking. Better sleep. This is the single highest-ROI dietary change I''ve ever made ✨','ACHIEVEMENT',NOW()-INTERVAL '38 days',NOW()-INTERVAL '38 days'),
              ('40000000-0000-0000-0000-000000000018','10000000-0000-0000-0000-000000000007','Avocado Toast 2.0: thick-cut sourdough, smashed avo with lemon, everything bagel seasoning, hemp seeds, micro greens, and a perfectly poached egg. Under 15 minutes. Protein-packed and genuinely delicious 🥑🍳','RECIPE',NOW()-INTERVAL '22 days',NOW()-INTERVAL '22 days'),
              ('40000000-0000-0000-0000-000000000019','10000000-0000-0000-0000-000000000007','Why eating the rainbow matters: red = lycopene + antioxidants, orange = beta-carotene, green = folate + chlorophyll, blue/purple = anthocyanins, white = allicin. Each colour delivers different phytonutrients your body needs daily 🌈','TIP',NOW()-INTERVAL '10 days',NOW()-INTERVAL '10 days'),
              ('40000000-0000-0000-0000-000000000020','10000000-0000-0000-0000-000000000008','Completed Devil''s Peak trail run this morning! 1,200m elevation gain over 18km. 3.5 hours of pure suffering, breathtaking views, and the best post-run coffee of my life. This is why we train 🏔️☕','ACHIEVEMENT',NOW()-INTERVAL '35 days',NOW()-INTERVAL '35 days'),
              ('40000000-0000-0000-0000-000000000021','10000000-0000-0000-0000-000000000008','Trail running tip most people ignore: hiking poles are not for wimps. Studies show they reduce knee joint impact by up to 25% on steep descents, which means you arrive at the finish line with something left in the tank 🎯','TIP',NOW()-INTERVAL '18 days',NOW()-INTERVAL '18 days'),
              ('40000000-0000-0000-0000-000000000022','10000000-0000-0000-0000-000000000009','Day 300 of consecutive daily meditation. What started as a reluctant 5-minute experiment has become the non-negotiable anchor of my entire day. The science is clear: 8+ weeks of daily practice physically changes your brain 🙏✨','ACHIEVEMENT',NOW()-INTERVAL '30 days',NOW()-INTERVAL '30 days'),
              ('40000000-0000-0000-0000-000000000023','10000000-0000-0000-0000-000000000009','The 5-4-3-2-1 grounding technique: Name 5 things you see, 4 you can touch, 3 you hear, 2 you smell, 1 you taste. This pulled me out of a full anxiety spiral last week in under 3 minutes. Please save this post 💙','TIP',NOW()-INTERVAL '15 days',NOW()-INTERVAL '15 days'),
              ('40000000-0000-0000-0000-000000000024','10000000-0000-0000-0000-000000000010','Sprint workout: 10×100m, 90 sec rest between reps. Total: 38 min. Speed is built in the rest, not just the effort. Your nervous system needs time to reset and fire at full capacity. Recovery IS the training ⚡','WORKOUT',NOW()-INTERVAL '28 days',NOW()-INTERVAL '28 days'),
              ('40000000-0000-0000-0000-000000000025','10000000-0000-0000-0000-000000000010','HIIT vs Steady State — the honest answer: BOTH work, for different goals. HIIT = VO2 max, metabolic efficiency, time-efficient. Steady state = fat oxidation, aerobic base, recovery. Choose based on your outcome, not the hype 📊','TIP',NOW()-INTERVAL '12 days',NOW()-INTERVAL '12 days'),
              ('40000000-0000-0000-0000-000000000026','10000000-0000-0000-0000-000000000011','Book 20 finished this year: Atomic Habits by James Clear. The insight that compounded habits at just 1% per day yield 37× improvement in a year is something I think about every single morning. Go read it now 📚','ACHIEVEMENT',NOW()-INTERVAL '25 days',NOW()-INTERVAL '25 days'),
              ('40000000-0000-0000-0000-000000000027','10000000-0000-0000-0000-000000000011','30 minutes of reading before bed beats 30 minutes of doom-scrolling EVERY single time. Your future self is being built right now by the information you feed your brain before sleep. Choose wisely 📖💭','MOTIVATION',NOW()-INTERVAL '10 days',NOW()-INTERVAL '10 days'),
              ('40000000-0000-0000-0000-000000000028','10000000-0000-0000-0000-000000000012','3km open water swim this morning — water temp: 14°C. My body screamed for the first 400m, then something clicked and I felt incredible. Cold water exposure is one of the most underutilized performance tools available 🏊‍♂️🧊','ACHIEVEMENT',NOW()-INTERVAL '22 days',NOW()-INTERVAL '22 days'),
              ('40000000-0000-0000-0000-000000000029','10000000-0000-0000-0000-000000000012','The breathing drill that improved my swim efficiency by 20%: bilateral breathing every 3 strokes instead of always favouring one side. Takes 2 weeks to feel natural. After that, your body position in the water transforms 🌊','TIP',NOW()-INTERVAL '8 days',NOW()-INTERVAL '8 days'),
              ('40000000-0000-0000-0000-000000000030','10000000-0000-0000-0000-000000000013','3-ingredient energy bites: 1 cup oats + ½ cup peanut butter + 3 tbsp honey. Mix, roll into balls, refrigerate 20 min. No bake, no cooking, no excuses. Perfect pre-workout fuel in under 30 minutes 🌱⚡','RECIPE',NOW()-INTERVAL '18 days',NOW()-INTERVAL '18 days'),
              ('40000000-0000-0000-0000-000000000031','10000000-0000-0000-0000-000000000013','Golden Milk Latte: 2 cups oat milk, 1 tsp turmeric, ½ tsp ginger, ¼ tsp cinnamon, 1 tsp honey, pinch of black pepper (activates curcumin absorption). Simmer 5 min, blend until frothy. Anti-inflammatory magic in a mug 🌿☕','RECIPE',NOW()-INTERVAL '8 days',NOW()-INTERVAL '8 days'),
              ('40000000-0000-0000-0000-000000000032','10000000-0000-0000-0000-000000000014','FULL SPLITS ACHIEVED after 8 months of daily dedicated stretching! 🤸 Flexibility is the most underrated fitness attribute. It directly impacts injury prevention, athletic performance, and how you age. Don''t neglect it!','ACHIEVEMENT',NOW()-INTERVAL '15 days',NOW()-INTERVAL '15 days'),
              ('40000000-0000-0000-0000-000000000033','10000000-0000-0000-0000-000000000014','Morning mobility routine that changed my life (15 min): Hip flexor stretch 2min each side, thoracic spine rotation 1min, shoulder dislocates with band 2min, world''s greatest stretch 3 reps. Do this BEFORE every workout 🤸','WORKOUT',NOW()-INTERVAL '5 days',NOW()-INTERVAL '5 days'),
              ('40000000-0000-0000-0000-000000000034','10000000-0000-0000-0000-000000000015','Massive shoutout to everyone who showed up to our Saturday community wellness walk! 47 people! The energy was electric. This is what it means to pursue health together. We are stronger as a community than any of us alone 🤝❤️','MOTIVATION',NOW()-INTERVAL '12 days',NOW()-INTERVAL '12 days'),
              ('40000000-0000-0000-0000-000000000035','10000000-0000-0000-0000-000000000015','Excited to announce our new online wellness accountability group! Weekly group challenges, daily check-ins, expert guest speakers, and a community that actually cares about your progress. Join the link in bio! 🎉','MOTIVATION',NOW()-INTERVAL '6 days',NOW()-INTERVAL '6 days'),
              ('40000000-0000-0000-0000-000000000036','10000000-0000-0000-0000-000000000015','Month 3 community check-in: 156 members reported improved sleep scores, 89 hit new fitness personal records, and 203 completed their weekly habit streaks. You are all absolutely incredible. This is just the beginning 📊🌟','PROGRESS',NOW()-INTERVAL '1 day',NOW()-INTERVAL '1 day');
